<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="text-hyper" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="text-dash" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#ff6bcb"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#c084fc" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="110" x2="800" y2="110"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="170" x2="800" y2="170"/>
    <line x1="100" y1="100" x2="0" y2="200"/>
    <line x1="200" y1="100" x2="0" y2="200"/>
    <line x1="300" y1="100" x2="0" y2="200"/>
    <line x1="400" y1="100" x2="400" y2="200"/>
    <line x1="500" y1="100" x2="800" y2="200"/>
    <line x1="600" y1="100" x2="800" y2="200"/>
    <line x1="700" y1="100" x2="800" y2="200"/>
  </g>

  <!-- Stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="150" cy="50" r="1"/>
    <circle cx="250" cy="25" r="1.5"/>
    <circle cx="350" cy="55" r="1"/>
    <circle cx="450" cy="20" r="2"/>
    <circle cx="550" cy="50" r="1"/>
    <circle cx="650" cy="30" r="1.5"/>
    <circle cx="750" cy="45" r="1"/>
    <circle cx="100" cy="70" r="1"/>
    <circle cx="300" cy="80" r="1.5"/>
    <circle cx="500" cy="75" r="1"/>
    <circle cx="700" cy="65" r="1.5"/>
    <circle cx="200" cy="85" r="1"/>
    <circle cx="600" cy="85" r="1"/>
  </g>

  <!-- HYPER text -->
  <text x="400" y="88" text-anchor="middle" font-family="'Courier New', monospace" font-size="72" font-weight="bold" letter-spacing="18" fill="url(#text-hyper)" filter="url(#glow-strong)">
    HYPER
  </text>

  <!-- DASHBOARD text -->
  <text x="400" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" letter-spacing="12" fill="url(#text-dash)" filter="url(#glow)" opacity="0.9">
    DASHBOARD
  </text>

  <!-- Decorative brackets -->
  <text x="148" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-size="56" fill="#c084fc" filter="url(#glow)" opacity="0.35">{</text>
  <text x="652" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-size="56" fill="#c084fc" filter="url(#glow)" opacity="0.35">}</text>
</svg>
