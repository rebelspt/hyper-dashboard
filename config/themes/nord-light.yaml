# Nord Light — bright ambiance with Snow Storm background
# https://www.nordtheme.com
theme:
  background: "#eceff4"
  surface: "#e5e9f0"
  border: "#d8dee9"
  text: "#2e3440"
  text-muted: "#4c566a"
  accent: "#5e81ac"
  font: "Inter, system-ui, sans-serif"
  radius: "6px"

pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday
          - type: clock
            timezone: UTC
      - size: full
        widgets:
          - type: search
            hide-header: true
            search-engine: google
            autofocus: true
            placeholder: Search…
            bangs:
              - title: YouTube
                shortcut: "!yt"
                url: https://www.youtube.com/results?search_query={QUERY}
              - title: GitHub
                shortcut: "!gh"
                url: https://github.com/search?q={QUERY}
              - title: Wikipedia
                shortcut: "!w"
                url: https://en.wikipedia.org/wiki/Special:Search?search={QUERY}
          - type: bookmarks
            title: Links
            groups:
              - name: Dev
                links:
                  - name: GitHub
                    url: https://github.com
                    icon: github
                  - name: Stack Overflow
                    url: https://stackoverflow.com
                    icon: stackoverflow
                  - name: MDN
                    url: https://developer.mozilla.org
                    icon: mdnwebdocs
          - type: hacker-news
            title: Hacker News
            limit: 8
            cache: 30m
            async-policy: stale
          - type: releases
            title: Releases
            cache: 1h
            limit: 8
            async-policy: stale
            repositories:
              - go-gitea/gitea
              - grafana/grafana
              - glanceapp/glance
      - size: small
        widgets:
          - type: monitor
            title: Uptime
            cache: 5m
            async-policy: stale
            sites:
              - title: Google
                url: https://www.google.com
              - title: GitHub
                url: https://github.com
              - title: Wikipedia
                url: https://en.wikipedia.org
          - type: reddit
            title: r/technology
            subreddit: technology
            limit: 8
            sort-by: hot
            async-policy: stale
          - type: reddit
            title: r/programming
            subreddit: programming
            limit: 8
            sort-by: hot
            async-policy: stale
