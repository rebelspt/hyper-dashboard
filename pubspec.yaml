name: hyper_dashboard
description: A self-hosted dashboard inspired by glanceapp/glance, built with Dart + shelf + HTMX.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  yaml: ^3.1.2
  http: ^1.2.2
  xml: ^6.5.0
  args: ^2.5.0
  begod:
    path: pkg/begod
  dartkup:
    path: pkg/dartkup

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0
